<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watfake - Simulador WhatsApp</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #e5ddd5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            height: 600px;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #075E54;
            color: white;
            padding: 15px 20px;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header .status { font-size: 12px; opacity: 0.8; }
        .chat-header .progresso-header {
            font-size: 13px;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            background: white;
            overscroll-behavior: contain;
        }
        .chat-list .info {
            padding: 15px 20px;
            background: #f0f0f0;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
            color: #555;
            text-align: center;
        }
        .chat-item {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
            animation: fadeIn 0.5s ease;
        }
        .chat-item:hover { background: #f5f5f5; }
        .chat-item .nome { font-weight: 600; color: #333; }
        .chat-item .mensagem { color: #666; font-size: 14px; margin-top: 2px; word-wrap: break-word; }
        .chat-item .horario { float: right; color: #999; font-size: 12px; }
        .chat-item .nao-lidas {
            display: inline-block;
            background: #25D366;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 1px 8px;
            border-radius: 50%;
            margin-left: 8px;
        }
        .status-bar {
            padding: 10px 20px;
            background: #f9f9f9;
            border-top: 1px solid #ddd;
            font-size: 13px;
            color: #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .status-bar .atualizacao { font-size: 11px; color: #999; }
        .btn-reset { background: #d9534f; color: white; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-reset:hover { background: #c9302c; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <span>📱 Watfake</span>
            <span class="progresso-header" id="progressoHeader">📦 0/0 entregues</span>
            <span class="status" id="statusHeader">🟢 Conectado</span>
        </div>

        <div class="chat-list">
            <div class="info">
                ⏳ Mensagens entregues: <strong id="contador">0</strong>
                <span id="statusTimeline" style="margin-left: 15px;">✅ Timeline ativa</span>
            </div>
            <div id="containerList"></div>
        </div>

        <div class="status-bar">
            <span id="progresso">📊 Progresso: 0/0</span>
            <span id="proxima">⏰ Próxima mensagem em: --</span>
            <button class="btn-reset" onclick="resetarFila()">🔄 Resetar</button>
            <span class="atualizacao" id="ultimaAtualizacao"></span>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- DADOS VINDOS DO JINJA (Escondidos do JS Linter) -->
    <!-- ============================================ -->
    <script id="dados-mensagens" type="application/json">
        {{ mensagens|tojson|safe }}
    </script>
    <div id="dados-meta" data-total="{{ total }}" style="display: none;"></div>

    <script>
        // ============================================
        // LEITURA DOS DADOS COM SEGURANÇA E SEM ERROS
        // ============================================
        let mensagens = JSON.parse(document.getElementById('dados-mensagens').textContent || '[]');
        const totalMensagens = parseInt(document.getElementById('dados-meta').getAttribute('data-total')) || 0;

        function renderizarContainers() {
            const containerList = document.getElementById('containerList');
            const contador = document.getElementById('contador');
            const progresso = document.getElementById('progresso');
            const progressoHeader = document.getElementById('progressoHeader');
            const ultimaAtualizacao = document.getElementById('ultimaAtualizacao');

            containerList.innerHTML = '';

            mensagens.forEach((msg, index) => {
                const container = document.createElement('div');
                container.setAttribute('data-testid', `list-item-${index}`);
                container.className = 'chat-item';

                const nomeDiv = document.createElement('div');
                nomeDiv.setAttribute('data-testid', 'cell-frame-title');
                nomeDiv.className = 'nome';
                nomeDiv.textContent = msg.nome || 'Desconhecido';

                const msgDiv = document.createElement('div');
                msgDiv.setAttribute('data-testid', 'cell-frame-secondary');
                msgDiv.className = 'mensagem';
                msgDiv.textContent = msg.mensagem || '';

                const horarioDiv = document.createElement('div');
                horarioDiv.setAttribute('data-testid', 'cell-frame-primary-detail');
                horarioDiv.className = 'horario';
                horarioDiv.textContent = msg.horario || '';

                const naoLidasSpan = document.createElement('span');
                naoLidasSpan.setAttribute('data-testid', 'icon-unread-count');
                naoLidasSpan.className = 'nao-lidas';
                const naoLidas = msg.nao_lidas || 0;
                naoLidasSpan.textContent = naoLidas > 0 ? naoLidas : '';
                if (naoLidas == 0) naoLidasSpan.style.display = 'none';

                container.appendChild(nomeDiv);
                container.appendChild(msgDiv);
                container.appendChild(horarioDiv);
                container.appendChild(naoLidasSpan);
                containerList.appendChild(container);
            });

            contador.textContent = mensagens.length;
            progresso.textContent = `📊 Progresso: ${mensagens.length}/${totalMensagens}`;
            progressoHeader.textContent = `📦 ${mensagens.length}/${totalMensagens} entregues`;
            ultimaAtualizacao.textContent = `🕐 Atualizado: ${new Date().toLocaleTimeString()}`;
        }

        function buscarNovasMensagens() {
            fetch('/api/mensagens')
                .then(response => response.json())
                .then(data => {
                    const novasMensagens = data.entregues;
                    if (novasMensagens.length > mensagens.length) {
                        mensagens = novasMensagens;
                        renderizarContainers();
                    }
                    const pendentes = data.pendentes;
                    document.getElementById('proxima').textContent = pendentes > 0 ? 
                        `⏰ ${pendentes} mensagens pendentes` : '✅ Todas entregues!';
                })
                .catch(err => console.log('Erro ao buscar:', err));
        }

        function resetarFila() {
            if (confirm('Resetar a fila?')) {
                fetch('/api/reset', { method: 'POST' })
                    .then(() => {
                        mensagens = [];
                        renderizarContainers();
                        document.getElementById('proxima').textContent = '⏰ Resetado!';
                    });
            }
        }

        // ============================================
        // INICIALIZA
        // ============================================
        renderizarContainers();
        setInterval(buscarNovasMensagens, 3000);
        console.log('✅ Watfake rodando!');
    </script>
</body>
</html>
