<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watfake - Simulador WhatsApp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #e5ddd5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            height: 600px;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #075E54;
            color: white;
            padding: 15px 20px;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header .status {
            font-size: 12px;
            opacity: 0.8;
        }
        .chat-header .progresso-header {
            font-size: 13px;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            background: white;
            overscroll-behavior: contain;
        }
        .chat-list .info {
            padding: 15px 20px;
            background: #f0f0f0;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
            color: #555;
            text-align: center;
        }
        .chat-list .info strong { color: #075E54; }
        .chat-item {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
            animation: fadeIn 0.5s ease;
        }
        .chat-item:hover { background: #f5f5f5; }
        .chat-item .nome { font-weight: 600; color: #333; }
        .chat-item .mensagem { color: #666; font-size: 14px; margin-top: 2px; word-wrap: break-word; }
        .chat-item .horario { float: right; color: #999; font-size: 12px; }
        .chat-item .nao-lidas {
            display: inline-block;
            background: #25D366;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 1px 8px;
            border-radius: 50%;
            margin-left: 8px;
        }
        .status-bar {
            padding: 10px 20px;
            background: #f9f9f9;
            border-top: 1px solid #ddd;
            font-size: 13px;
            color: #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .status-bar .atualizacao { font-size: 11px; color: #999; }
        .btn-reset { background: #d9534f; color: white; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-reset:hover { background: #c9302c; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.8s ease;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-overlay .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e0e0e0;
            border-top-color: #075E54;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-overlay p {
            margin-top: 15px;
            color: #555;
            font-size: 16px;
        }
        .loading-overlay .timer {
            font-weight: bold;
            color: #075E54;
            font-size: 24px;
            margin-top: 5px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .chat-list-wrapper {
            position: relative;
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- CABEÇALHO -->
        <div class="chat-header">
            <span>📱 Watfake</span>
            <span class="progresso-header" id="progressoHeader">📦 0/0 entregues</span>
            <span class="status" id="statusHeader">🔴 Desconectado</span>
        </div>

        <!-- LISTA DE CONVERSAS -->
        <div class="chat-list-wrapper">
            <!-- TELA DE LOGIN SIMULADO -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <p>🔄 Conectando ao Watfake...</p>
                <div class="timer" id="timerLogin">5</div>
                <p style="font-size: 12px; color: #999;">Simulando login no WhatsApp Web</p>
            </div>

            <div class="chat-list" id="chatList">
                <div class="info">
                    ⏳ Mensagens entregues: <strong id="contador">0</strong>
                    <span id="statusTimeline" style="margin-left: 15px;">⏳ Aguardando login...</span>
                </div>
                <div id="containerList">
                    <!-- Os containers serão injetados aqui pelo JavaScript -->
                </div>
            </div>
        </div>

        <!-- STATUS BAR -->
        <div class="status-bar">
            <span id="progresso">📊 Progresso: 0/0</span>
            <span id="proxima">⏰ Próxima mensagem em: --</span>
            <button class="btn-reset" onclick="resetarFila()">🔄 Resetar</button>
            <span class="atualizacao" id="ultimaAtualizacao"></span>
        </div>
    </div>

    <script>
        // ============================================
        // ESTADO
        // ============================================
        let mensagens = {{ mensagens|tojson }};
        const totalMensagens = {{ total }};
        const tempoLogin = {{ tempo_login }};
        let logado = false;

        // ============================================
        // TIMER DE LOGIN
        // ============================================
        let timerLogin = tempoLogin;
        const timerElement = document.getElementById('timerLogin');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const statusHeader = document.getElementById('statusHeader');

        function atualizarTimerLogin() {
            timerElement.textContent = timerLogin;
            if (timerLogin > 0) {
                timerLogin--;
                setTimeout(atualizarTimerLogin, 1000);
            } else {
                loadingOverlay.classList.add('hidden');
                logado = true;
                statusHeader.innerHTML = '🟢 Conectado';
                document.getElementById('statusTimeline').innerHTML = '✅ Login realizado! Iniciando timeline...';
                document.getElementById('statusTimeline').style.color = '#4CAF50';
                buscarNovasMensagens();
            }
        }

        // Inicia o timer de login
        atualizarTimerLogin();

        // ============================================
        // RENDERIZA OS CONTAINERS
        // ============================================
        function renderizarContainers() {
            const containerList = document.getElementById('containerList');
            const contador = document.getElementById('contador');
            const progresso = document.getElementById('progresso');
            const progressoHeader = document.getElementById('progressoHeader');
            const ultimaAtualizacao = document.getElementById('ultimaAtualizacao');

            containerList.innerHTML = '';

            mensagens.forEach((msg, index) => {
                const container = document.createElement('div');
                container.setAttribute('data-testid', `list-item-${index}`);
                container.className = 'chat-item';

                const nomeDiv = document.createElement('div');
                nomeDiv.setAttribute('data-testid', 'cell-frame-title');
                nomeDiv.className = 'nome';
                nomeDiv.textContent = msg.nome;

                const msgDiv = document.createElement('div');
                msgDiv.setAttribute('data-testid', 'cell-frame-secondary');
                msgDiv.className = 'mensagem';
                msgDiv.textContent = msg.mensagem;

                const horarioDiv = document.createElement('div');
                horarioDiv.setAttribute('data-testid', 'cell-frame-primary-detail');
                horarioDiv.className = 'horario';
                horarioDiv.textContent = msg.horario;

                const naoLidasSpan = document.createElement('span');
                naoLidasSpan.setAttribute('data-testid', 'icon-unread-count');
                naoLidasSpan.className = 'nao-lidas';
                naoLidasSpan.textContent = msg.nao_lidas > 0 ? msg.nao_lidas : '';
                if (msg.nao_lidas == 0) {
                    naoLidasSpan.style.display = 'none';
                }

                container.appendChild(nomeDiv);
                container.appendChild(msgDiv);
                container.appendChild(horarioDiv);
                container.appendChild(naoLidasSpan);
                containerList.appendChild(container);
            });

            contador.textContent = mensagens.length;
            progresso.textContent = `📊 Progresso: ${mensagens.length}/${totalMensagens}`;
            progressoHeader.textContent = `📦 ${mensagens.length}/${totalMensagens} entregues`;

            const agora = new Date();
            ultimaAtualizacao.textContent = `🕐 Atualizado: ${agora.toLocaleTimeString()}`;
        }

        // ============================================
        // BUSCA NOVAS MENSAGENS DO SERVIDOR
        // ============================================
        function buscarNovasMensagens() {
            if (!logado) return;

            fetch('/api/mensagens')
                .then(response => response.json())
                .then(data => {
                    const novasMensagens = data.entregues;
                    
                    if (novasMensagens.length > mensagens.length) {
                        mensagens = novasMensagens;
                        renderizarContainers();
                        
                        const statusTimeline = document.getElementById('statusTimeline');
                        statusTimeline.innerHTML = `📩 Nova mensagem entregue! (${mensagens.length}/${totalMensagens})`;
                        statusTimeline.style.color = '#25D366';
                        setTimeout(() => { statusTimeline.style.color = ''; }, 3000);
                    }

                    const pendentes = data.pendentes;
                    const proximaDiv = document.getElementById('proxima');
                    if (pendentes > 0) {
                        proximaDiv.textContent = `⏰ Próxima mensagem em ~5s (${pendentes} pendentes)`;
                    } else {
                        proximaDiv.textContent = '✅ Todas as mensagens entregues!';
                    }

                    if (pendentes === 0 && mensagens.length > 0) {
                        document.getElementById('statusTimeline').innerHTML = '✅ Todas as mensagens entregues!';
                        document.getElementById('statusTimeline').style.color = '#4CAF50';
                    }
                })
                .catch(error => console.error('Erro ao buscar mensagens:', error));
        }

        // ============================================
        // RESETAR FILA
        // ============================================
        function resetarFila() {
            if (confirm('Resetar a fila? Todas as mensagens serão removidas.')) {
                fetch('/api/reset', { method: 'POST' })
                    .then(() => {
                        mensagens = [];
                        logado = false;
                        timerLogin = tempoLogin;
                        loadingOverlay.classList.remove('hidden');
                        statusHeader.innerHTML = '🔴 Desconectado';
                        document.getElementById('statusTimeline').innerHTML = '⏳ Aguardando login...';
                        document.getElementById('proxima').textContent = '⏰ Próxima mensagem em: --';
                        renderizarContainers();
                        atualizarTimerLogin();
                    });
            }
        }

        // ============================================
        // INICIALIZA
        // ============================================
        renderizarContainers();
        setInterval(buscarNovasMensagens, 3000);

        console.log('✅ Watfake com Login Simulado e Timeline rodando!');
        console.log(`📦 Total de mensagens: ${totalMensagens}`);
        console.log(`⏱️ Login simulado em: ${tempoLogin} segundos`);
    </script>
</body>
</html>
